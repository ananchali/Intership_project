<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Main circular background - blue to match the theme -->
  <circle cx="20" cy="20" r="19" fill="#4F46E5"/>
  
  <!-- Inner white ring for contrast -->
  <circle cx="20" cy="20" r="16" fill="white" stroke="none"/>
  
  <!-- Blue center circle - slightly lighter shade -->
  <circle cx="20" cy="20" r="13" fill="#6366F1"/>
  
  <!-- Abstract design elements - blue gradient -->
  <path d="M12 20 Q20 14, 28 20 Q20 26, 12 20" fill="#4F46E5" opacity="0.8"/>
  
  <!-- Center white circle -->
  <circle cx="20" cy="20" r="6" fill="white"/>
  
  <!-- Blue center dot -->
  <circle cx="20" cy="20" r="3" fill="#4F46E5"/>
  
  <!-- Additional abstract elements - subtle blue lines -->
  <path d="M14 16 Q20 20, 26 16" stroke="#4F46E5" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M14 24 Q20 20, 26 24" stroke="#4F46E5" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Small decorative elements - subtle blue dots -->
  <circle cx="15" cy="15" r="1.5" fill="#6366F1" opacity="0.5"/>
  <circle cx="25" cy="15" r="1.5" fill="#6366F1" opacity="0.5"/>
  <circle cx="15" cy="25" r="1.5" fill="#6366F1" opacity="0.5"/>
  <circle cx="25" cy="25" r="1.5" fill="#6366F1" opacity="0.5"/>
</svg>
