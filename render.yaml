databases:
  - name: laravel-postgres
    databaseName: laravel
    user: laravel_user
    plan: free

services:
  - type: web
    name: payment-verification-system
    env: docker
    plan: free
    dependsOn:
      - laravel-postgres
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laravel-postgres
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generate: true
      - key: APP_URL
        value: https://intership-project-yua6.onrender.com
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_DOMAIN
        value: intership-project-yua6.onrender.com
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_SSLMODE
        value: require
      - key: QUEUE_CONNECTION
        value: sync
      - key: TRUSTED_PROXIES
        value: "*"
