databases:
  - name: laravel-postgres
    databaseName: laravel
    user: laravel_user
    plan: free

services:
  - type: web
    name: payment-verification-system
    env: docker
    plan: free
    dependsOn:
      - laravel-postgres
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laravel-postgres
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generate: true
      - key: APP_URL
        value: https://payment-verification-system.onrender.com
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
