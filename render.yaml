databases:
  - name: laravel-postgres
    databaseName: laravel
    user: laravel_user
    plan: free

services:
  - type: web
    name: payment-verification-system
    env: docker
    plan: free
    dependsOn:
      - laravel-postgres
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laravel-postgres
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        # We don't have the exact Render URL yet, but Laravel handles relative URLs well usually.
        # Alternatively, you can override this in the Render dashboard later.
        sync: false
